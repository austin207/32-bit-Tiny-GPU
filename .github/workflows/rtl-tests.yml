name: RTL cocotb tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  rtl-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install simulator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog make gcc

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cocotb pytest
          python -m pip install cocotb pytest

      - name: Run all cocotb tests
        run: make test